<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Análise de Jogo</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

  <h1 class="page-title">Análise de Jogo</h1>

  <div id="app-root">

    <div class="top-bar">
      <div class="match-indicator" id="team-indicator">Equipa</div>
      <button class="action" id="btn-switch-team">Trocar de equipa</button>
      <button class="action" id="btn-sign-out">Sair</button>
    </div>

    <div class="players-card">
      <h2 class="tracker-title">Novo Jogo</h2>
      <div class="player-form">
        <input type="date" id="match-date">
        <input type="text" id="match-opponent" placeholder="Adversário">
        <button class="action" id="btn-create-match">Criar Jogo</button>
      </div>
    </div>

    <div class="players-card">
      <h2 class="tracker-title">Jogos</h2>
      <table class="players-table">
        <thead><tr><th>Data</th><th>Adversário</th><th></th></tr></thead>
        <tbody id="matches-body"></tbody>
      </table>
      <p class="hint" id="matches-empty">Ainda não criaste nenhum jogo.</p>
    </div>

    <div class="players-card" id="import-card" hidden>
      <h2 class="tracker-title">Importar dados locais</h2>
      <p class="hint">Encontrei dados guardados neste browser (de antes desta atualização). Podes importá-los para um novo jogo.</p>
      <button class="action" id="btn-import-local">Importar dados locais para um novo jogo</button>
    </div>

  </div>

<script type="module" src="dashboard.js"></script>
</body>
</html>
