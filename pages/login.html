<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Análise de Jogo — Entrar</title>
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>

  <h1 class="page-title">Análise de Jogo</h1>

  <div class="auth-card" id="auth-screen">
    <h2 class="tracker-title">Entrar</h2>
    <div class="auth-form">
      <input type="email" id="auth-email" placeholder="Email" autocomplete="email">
      <input type="password" id="auth-password" placeholder="Palavra-passe" autocomplete="current-password">
      <div class="auth-actions">
        <button class="action" id="btn-sign-in">Entrar</button>
        <button class="action" id="btn-sign-up">Criar conta</button>
      </div>
      <p class="hint" id="auth-error"></p>
    </div>
  </div>

<script type="module" src="../js/login.js"></script>
</body>
</html>
