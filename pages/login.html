<!DOCTYPE html>
<!--
  Análise de Jogo — pages/login.html
  Página de entrada: login e registo de conta (email + palavra-passe).
  Lógica em ../js/login.js.

  Versão: 1.2 (2026-07-14)
  Histórico:
    1.0 (2026-07-08) — criação como página de login separada do resto da app.
    1.1 (2026-07-08) — renomeada de faltas.html para login.html.
    1.2 (2026-07-14) — movida de raiz para pages/, caminhos de css/js atualizados.
-->
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Análise de Jogo — Entrar</title>
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>

  <h1 class="page-title">Análise de Jogo</h1>

  <div class="auth-card" id="auth-screen">
    <h2 class="tracker-title">Entrar</h2>
    <div class="auth-form">
      <input type="email" id="auth-email" placeholder="Email" autocomplete="email">
      <input type="password" id="auth-password" placeholder="Palavra-passe" autocomplete="current-password">
      <div class="auth-actions">
        <button class="action" id="btn-sign-in">Entrar</button>
        <button class="action" id="btn-sign-up">Criar conta</button>
      </div>
      <p class="hint" id="auth-error"></p>
    </div>
  </div>

<script type="module" src="../js/login.js"></script>
</body>
</html>
